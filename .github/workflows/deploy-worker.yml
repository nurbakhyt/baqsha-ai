name: Deploy Worker

on:
  push:
    branches: [main]
    paths: ['apps/worker/**', '.github/workflows/deploy-worker.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: pnpm install
      - name: Debug secret
        run: echo "Token is set: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
      - run: pnpm deploy:worker
