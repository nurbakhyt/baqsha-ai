name = "baqsha-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "baqsha-worker-prod"

[[d1_databases]]
binding = "DB"
database_name = "baqsha-db"
database_id = "your-d1-database-id"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id"
preview_id = "your-preview-kv-id"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "baqsha-images"

[ai]
binding = "AI"

[vars]
APP_NAME = "Baqsha.AI"
JWT_SECRET = "your-jwt-secret-min-32-chars"
CORS_ORIGIN = "https://baqsha.ai"